# Fish Fry Orders Helm Chart Values

replicaCount: 1

image:
  repository: git.nonahob.net/jacob/fish-fry-orders-v2
  tag: latest
  pullPolicy: Always
  pullSecrets:
    - name: regcred

service:
  type: ClusterIP
  port: 8080

# Database configuration - uses secretRef to mount full config
database:
  secretRef:
    name: postgres
    namespace: ""  # defaults to release namespace if empty

# Authentication - uses secretRef to mount full config
auth:
  secretRef:
    name: user-auth
    namespace: ""  # defaults to release namespace if empty

# Redis configuration (optional)
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  db: 0

# Gloo Edge configuration
gloo:
  # Namespace where Gloo Edge is installed
  namespace: gloo-ee-system
  
  # Upstream configuration
  upstream:
    enabled: true
    name: fish-fry-orders-v2-upstream
  
  # VirtualService configuration
  virtualService:
    enabled: true
    name: fish-fry-orders-v2
    domains:
      - stmichaelfishfry.com
    # SSL configuration (certificate should be managed by cert-manager)
    ssl:
      enabled: false
      secretName: stmichaelfishfry-tls
    # WebSocket configuration for /ws/* routes
    websocket:
      enabled: true

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
