{{- if .Values.gloo.virtualService.enabled }}
apiVersion: gateway.solo.io/v1
kind: VirtualService
metadata:
  name: {{ .Values.gloo.virtualService.name }}
  namespace: {{ .Values.gloo.namespace }}
  labels:
    {{- include "fish-fry-orders-v2.labels" . | nindent 4 }}
spec:
  {{- if .Values.gloo.virtualService.ssl.enabled }}
  sslConfig:
    secretRef:
      name: {{ .Values.gloo.virtualService.ssl.secretName }}
      namespace: {{ .Values.gloo.namespace }}
    sniDomains:
    {{- range .Values.gloo.virtualService.domains }}
    - {{ . }}
    {{- end }}
  {{- end }}
  virtualHost:
    domains:
    {{- range .Values.gloo.virtualService.domains }}
    - {{ . }}
    {{- end }}
    routes:
    {{- if .Values.gloo.virtualService.websocket.enabled }}
    # WebSocket route for real-time updates
    - matchers:
      - prefix: /ws/
      routeAction:
        single:
          upstream:
            name: {{ .Values.gloo.upstream.name }}
            namespace: {{ .Values.gloo.namespace }}
      options:
        timeout: 0s
        upgrades:
        - websocket: {}
    {{- end }}
    # Main application route
    - matchers:
      - prefix: /
      routeAction:
        single:
          upstream:
            name: {{ .Values.gloo.upstream.name }}
            namespace: {{ .Values.gloo.namespace }}
{{- end }}
