apiVersion: v1
kind: Service
metadata:
  name: {{ include "fish-fry-orders.backend.fullname" . }}
  labels:
    {{- include "fish-fry-orders.labels" . | nindent 4 }}
    {{- include "fish-fry-orders.backend.selectorLabels" . | nindent 4 }}
  {{- with .Values.backend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "fish-fry-orders.backend.selectorLabels" . | nindent 4 }}
