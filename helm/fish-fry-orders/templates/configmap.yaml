apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fish-fry-orders.fullname" . }}-config
  labels:
    {{- include "fish-fry-orders.labels" . | nindent 4 }}
data:
  config.yaml: |
    database:
      host: {{ .Values.database.host | quote }}
      port: {{ .Values.database.port }}
      user: {{ .Values.database.user | quote }}
      password: "${DB_PASSWORD}"
      dbname: {{ .Values.database.dbname | quote }}
      sslmode: {{ .Values.database.sslmode | quote }}

    redis:
      enabled: {{ .Values.redis.enabled }}
      host: {{ .Values.redis.host | quote }}
      port: {{ .Values.redis.port }}
      password: {{ .Values.redis.password | quote }}
      db: {{ .Values.redis.db }}

    http:
      address: ":8080"

    grpc:
      address: ":50051"

    auth:
      worker_password: "${AUTH_WORKER_PASSWORD}"
      admin_password: "${AUTH_ADMIN_PASSWORD}"
