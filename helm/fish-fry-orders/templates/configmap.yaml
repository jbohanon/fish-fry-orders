apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fish-fry-orders.fullname" . }}-config
  labels:
    {{- include "fish-fry-orders.labels" . | nindent 4 }}
data:
  config.yaml: |
    # Database and auth configs loaded from secrets at /app/secrets/

    redis:
      enabled: {{ .Values.redis.enabled }}
      host: {{ .Values.redis.host | quote }}
      port: {{ .Values.redis.port }}
      password: {{ .Values.redis.password | quote }}
      db: {{ .Values.redis.db }}

    http:
      address: ":8080"

    grpc:
      address: ":50051"

    # Allowed origins for CORS and WebSocket connections
    allowed_origins:
      {{- range .Values.gloo.virtualService.domains }}
      - "https://{{ . }}"
      {{- end }}
