apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fish-fry-orders.fullname" . }}
  labels:
    {{- include "fish-fry-orders.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fish-fry-orders.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "fish-fry-orders.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.existingSecret.enabled }}
                  name: {{ .Values.database.existingSecret.name }}
                  key: {{ .Values.database.existingSecret.key }}
                  {{- else }}
                  name: {{ include "fish-fry-orders.fullname" . }}-secret
                  key: db-password
                  {{- end }}
            - name: AUTH_WORKER_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.auth.existingSecret.enabled }}
                  name: {{ .Values.auth.existingSecret.name }}
                  key: {{ .Values.auth.existingSecret.workerPasswordKey }}
                  {{- else }}
                  name: {{ include "fish-fry-orders.fullname" . }}-secret
                  key: auth-worker-password
                  {{- end }}
            - name: AUTH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.auth.existingSecret.enabled }}
                  name: {{ .Values.auth.existingSecret.name }}
                  key: {{ .Values.auth.existingSecret.adminPasswordKey }}
                  {{- else }}
                  name: {{ include "fish-fry-orders.fullname" . }}-secret
                  key: auth-admin-password
                  {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: {{ include "fish-fry-orders.fullname" . }}-config
