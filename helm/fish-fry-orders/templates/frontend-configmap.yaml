apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fish-fry-orders.fullname" . }}-frontend-config
  labels:
    {{- include "fish-fry-orders.labels" . | nindent 4 }}
data:
  config.js: |
    window.APP_CONFIG = {
      banner: {
        enabled: {{ .Values.frontend.banner.enabled }},
        message: {{ .Values.frontend.banner.message | quote }},
        type: {{ .Values.frontend.banner.type | quote }}
      },
      version: {{ .Values.frontend.version | quote }}
    };
