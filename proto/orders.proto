syntax = "proto3";

package orders;

option go_package = "git.nonahob.net/jacob/fish-fry-orders/proto";

// Order status
enum OrderStatus {
  NEW = 0;
  IN_PROGRESS = 1;
  COMPLETED = 2;
}

// Menu item
message MenuItem {
  string id = 1;
  string name = 2;
  double price = 3;
  bool is_active = 4;
}

// Order item
message OrderItem {
  string menu_item_id = 1;
  int32 quantity = 2;
}

// Order
message Order {
  string id = 1;
  string vehicle_description = 2;
  repeated OrderItem items = 3;
  OrderStatus status = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

// Chat message
message ChatMessage {
  string id = 1;
  string order_id = 2;
  string content = 3;
  string sender_role = 4;
  int64 created_at = 5;
}

// Statistics
message OrderStatistics {
  map<string, int32> item_counts = 1;
  double average_completion_time = 2;
  int32 total_orders = 3;
}

// Service definitions
service OrderService {
  // Order management
  rpc CreateOrder(CreateOrderRequest) returns (Order) {}
  rpc UpdateOrder(UpdateOrderRequest) returns (Order) {}
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (Order) {}
  rpc GetOrders(GetOrdersRequest) returns (stream Order) {}
  
  // Chat
  rpc SendMessage(SendMessageRequest) returns (ChatMessage) {}
  rpc GetMessages(GetMessagesRequest) returns (stream ChatMessage) {}
  
  // Statistics
  rpc GetStatistics(GetStatisticsRequest) returns (OrderStatistics) {}
  
  // Menu management
  rpc GetMenuItems(GetMenuItemsRequest) returns (GetMenuItemsResponse) {}
  rpc UpdateMenuItem(UpdateMenuItemRequest) returns (MenuItem) {}
}

// Request/Response messages
message CreateOrderRequest {
  string vehicle_description = 1;
  repeated OrderItem items = 2;
}

message UpdateOrderRequest {
  string order_id = 1;
  string vehicle_description = 2;
  repeated OrderItem items = 3;
}

message UpdateOrderStatusRequest {
  string order_id = 1;
  OrderStatus status = 2;
}

message GetOrdersRequest {
  string status_filter = 1;
}

message SendMessageRequest {
  string order_id = 1;
  string content = 2;
  string sender_role = 3;
}

message GetMessagesRequest {
  string order_id = 1;
}

message GetStatisticsRequest {
  int64 start_time = 1;
  int64 end_time = 2;
}

message GetMenuItemsRequest {}

message GetMenuItemsResponse {
  repeated MenuItem items = 1;
}

message UpdateMenuItemRequest {
  MenuItem item = 1;
} 