database:
  # All database config should come from /app/secrets/database mount
  # These are fallbacks for local development only
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "${DB_PASSWORD}"
  dbname: "fish_fry_orders"
  sslmode: "disable"

redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  db: 0

http:
  address: ":8080"

grpc:
  address: ":50051"

auth:
  worker_password: "${AUTH_WORKER_PASSWORD}"
  admin_password: "${AUTH_ADMIN_PASSWORD}"

# Allowed origins for CORS and WebSocket connections
# In production, set via environment or config override
allowed_origins:
  - "http://localhost:5173"
  - "http://localhost:8080" 